<style>
:root {
  --c2-blue: #0046AA;
  --c2-blue-dark: #003080;
  --c2-blue-light: #E8F0FE;
  --c2-accent: #FF6B2B;
  --c2-accent-hover: #E85A1B;
  --c2-green: #1B9E5A;
  --c2-purple: #7B3FA0;
  --c2-warm: #F8F6F3;
  --c2-text: #1A1A2E;
  --c2-text-mid: #4A4A6A;
  --c2-text-light: #8888A0;
  --c2-border: #E2E2EE;
  --c2-card-bg: #FFFFFF;
  --c2-shadow: 0 2px 16px rgba(0,30,80,0.06);
  --c2-shadow-hover: 0 8px 32px rgba(0,30,80,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-pill: 100px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 15px;
  -webkit-tap-highlight-color: transparent;
  scroll-behavior: smooth;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: var(--c2-warm);
  color: var(--c2-text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ────────────────────────────────── */
.header {
  background: linear-gradient(135deg, var(--c2-blue) 0%, var(--c2-blue-dark) 100%);
  padding: 28px 40px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(0,20,60,0.15);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 18px;
}

.brand-logo-img {
  height: 38px;
  width: auto;
  object-fit: contain;
  filter: brightness(0) invert(1);
}

.brand-separator {
  width: 1.5px;
  height: 32px;
  background: rgba(255,255,255,0.3);
}

.brand-logo-didacta {
  height: 30px;
  width: auto;
  object-fit: contain;
  opacity: 0.9;
}

.header-info {
  text-align: right;
  color: rgba(255,255,255,0.85);
  font-size: 0.85rem;
  line-height: 1.5;
}

.header-info strong {
  color: white;
  font-weight: 600;
}

/* ─── TABS ──────────────────────────────────── */
.tabs {
  display: flex;
  gap: 4px;
}

.tab {
  padding: 14px 28px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  border: none;
  border-radius: 12px 12px 0 0;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.92rem;
  font-weight: 500;
  transition: all 0.25s ease;
  letter-spacing: 0.2px;
  position: relative;
  bottom: -1px;
}

.tab:hover {
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.9);
}

.tab.active {
  background: var(--c2-warm);
  color: var(--c2-blue);
  font-weight: 600;
}

.tab-icon {
  margin-right: 8px;
  font-size: 1.05em;
}

/* ─── MAIN ──────────────────────────────────── */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px 40px 60px;
}

.tab-content {
  display: none;
  animation: fadeUp 0.35s ease;
}

.tab-content.active {
  display: block;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── FILTERS ───────────────────────────────── */
.filters-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--c2-text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-right: 4px;
  white-space: nowrap;
}

.filter-btn {
  padding: 10px 18px;
  border: 1.5px solid var(--c2-border);
  border-radius: var(--radius-pill);
  background: white;
  color: var(--c2-text-mid);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
}

.filter-btn:hover {
  border-color: var(--c2-blue);
  color: var(--c2-blue);
  background: var(--c2-blue-light);
}

.filter-btn.active {
  background: var(--c2-blue);
  color: white;
  border-color: var(--c2-blue);
}

.filter-separator {
  width: 1px;
  height: 28px;
  background: var(--c2-border);
  margin: 0 6px;
}

.search-box {
  flex: 1;
  min-width: 220px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 10px 18px 10px 42px;
  border: 1.5px solid var(--c2-border);
  border-radius: var(--radius-pill);
  background: white;
  font-family: inherit;
  font-size: 0.88rem;
  color: var(--c2-text);
  outline: none;
  transition: border-color 0.2s;
}

.search-box input:focus {
  border-color: var(--c2-blue);
}

.search-box input::placeholder {
  color: var(--c2-text-light);
}

.search-box .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--c2-text-light);
  font-size: 0.95rem;
  pointer-events: none;
}

/* ─── DAY SELECTOR ──────────────────────────── */
.day-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
}

.day-btn {
  flex: 1;
  padding: 18px 20px;
  border: 2px solid var(--c2-border);
  border-radius: var(--radius);
  background: white;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s ease;
  text-align: center;
  user-select: none;
  -webkit-user-select: none;
}

.day-btn:hover {
  border-color: var(--c2-blue);
  transform: translateY(-2px);
  box-shadow: var(--c2-shadow);
}

.day-btn.active {
  border-color: var(--c2-blue);
  background: var(--c2-blue);
  color: white;
  box-shadow: 0 4px 20px rgba(0,70,170,0.25);
}

.day-btn .day-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.6;
  margin-bottom: 4px;
}

.day-btn.active .day-label { opacity: 0.8; }

.day-btn .day-date {
  font-family: 'Montserrat', Arial, sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
}

.day-btn .day-count {
  font-size: 0.78rem;
  margin-top: 4px;
  opacity: 0.55;
  font-weight: 500;
}

.day-btn.active .day-count { opacity: 0.75; }

/* ─── TYPE FILTERS (pills) ──────────────────── */
.type-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.type-pill {
  padding: 8px 18px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--c2-border);
  background: white;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
  -webkit-user-select: none;
}

.type-pill:hover { border-color: var(--c2-blue); }

.type-pill.active {
  border-color: transparent;
  color: white;
}

.type-pill[data-type="Workshop"].active { background: var(--c2-blue); }
.type-pill[data-type="Demo"].active { background: var(--c2-green); }
.type-pill[data-type="Seminario"].active { background: var(--c2-purple); }
.type-pill[data-type="Visita Guidata"].active { background: var(--c2-accent); }

.type-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.type-pill[data-type="Workshop"] .type-dot { background: var(--c2-blue); }
.type-pill[data-type="Demo"] .type-dot { background: var(--c2-green); }
.type-pill[data-type="Seminario"] .type-dot { background: var(--c2-purple); }
.type-pill[data-type="Visita Guidata"] .type-dot { background: var(--c2-accent); }
.type-pill.active .type-dot { background: white; }

.type-pill .pill-count {
  background: rgba(0,0,0,0.08);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}

.type-pill.active .pill-count { background: rgba(255,255,255,0.25); }

/* ─── ROOM FILTER ───────────────────────────── */
.room-filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.room-pill {
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--c2-border);
  background: white;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--c2-text-mid);
  user-select: none;
  -webkit-user-select: none;
}

.room-pill:hover { border-color: var(--c2-blue); color: var(--c2-blue); }

.room-pill.active {
  background: var(--c2-text);
  color: white;
  border-color: var(--c2-text);
}

/* ─── RESULTS COUNTER ───────────────────────── */
.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.results-count {
  font-size: 0.85rem;
  color: var(--c2-text-light);
  font-weight: 500;
}

.results-count strong {
  color: var(--c2-text);
  font-weight: 700;
}

/* ─── VIEW TOGGLE ───────────────────────────── */
.view-toggle {
  display: flex;
  background: white;
  border: 1.5px solid var(--c2-border);
  border-radius: var(--radius-pill);
  overflow: hidden;
  padding: 3px;
}

.view-toggle-btn {
  padding: 7px 16px;
  border: none;
  background: transparent;
  font-family: Arial, sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--c2-text-mid);
  cursor: pointer;
  border-radius: var(--radius-pill);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
}

.view-toggle-btn:hover {
  color: var(--c2-text);
}

.view-toggle-btn.active {
  background: var(--c2-blue);
  color: white;
  font-weight: 600;
}

/* ─── ROOM GROUP (for Vista per Aula) ───────── */
.room-group {
  margin-bottom: 36px;
}

.room-group-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 10px 18px;
  background: white;
  border-radius: var(--radius);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  position: sticky;
  top: 140px;
  z-index: 10;
}

.room-group-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--c2-blue-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.room-group-name {
  font-family: 'Montserrat', Arial, sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--c2-text);
}

.room-group-count {
  font-size: 0.78rem;
  color: var(--c2-text-light);
  font-weight: 500;
  margin-left: auto;
}

/* ─── TIMELINE ──────────────────────────────── */
.timeline {
  position: relative;
}

.time-group {
  margin-bottom: 32px;
}

.time-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding: 6px 16px 6px 12px;
  background: white;
  border-radius: var(--radius-pill);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  position: sticky;
  top: 140px;
  z-index: 10;
}

.time-label .clock-icon {
  font-size: 1.1rem;
}

.time-label span {
  font-family: Arial, sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--c2-text);
  letter-spacing: -0.3px;
}

.events-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

/* ─── EVENT CARD ────────────────────────────── */
.event-card {
  background: var(--c2-card-bg);
  border-radius: var(--radius);
  border: 1.5px solid var(--c2-border);
  overflow: hidden;
  transition: all 0.25s ease;
  cursor: pointer;
  position: relative;
}

.event-card:hover {
  border-color: transparent;
  box-shadow: var(--c2-shadow-hover);
  transform: translateY(-3px);
}

.event-card-stripe {
  height: 4px;
  width: 100%;
}

.event-card[data-type="Workshop"] .event-card-stripe { background: var(--c2-blue); }
.event-card[data-type="Demo"] .event-card-stripe { background: var(--c2-green); }
.event-card[data-type="Seminario"] .event-card-stripe { background: var(--c2-purple); }
.event-card[data-type="Visita Guidata"] .event-card-stripe { background: var(--c2-accent); }

.event-card-body {
  padding: 18px 20px;
}

.event-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.event-type-badge {
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.event-card[data-type="Workshop"] .event-type-badge { background: rgba(0,70,170,0.1); color: var(--c2-blue); }
.event-card[data-type="Demo"] .event-type-badge { background: rgba(27,158,90,0.1); color: var(--c2-green); }
.event-card[data-type="Seminario"] .event-type-badge { background: rgba(123,63,160,0.1); color: var(--c2-purple); }
.event-card[data-type="Visita Guidata"] .event-type-badge { background: rgba(255,107,43,0.1); color: var(--c2-accent); }

.event-partner {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--c2-text-mid);
  display: flex;
  align-items: center;
  gap: 5px;
}

.event-card-title {
  font-family: 'Montserrat', Arial, sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.35;
  color: var(--c2-text);
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.event-card-room {
  font-size: 0.78rem;
  color: var(--c2-text-light);
  display: flex;
  align-items: center;
  gap: 5px;
}

.event-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-top: 1px solid var(--c2-border);
  background: rgba(0,0,0,0.015);
}

.event-capacity {
  font-size: 0.78rem;
  color: var(--c2-text-light);
  display: flex;
  align-items: center;
  gap: 5px;
}

.event-capacity .cap-bar {
  width: 48px;
  height: 4px;
  border-radius: 2px;
  background: var(--c2-border);
  overflow: hidden;
}

.event-capacity .cap-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--c2-green);
  transition: width 0.6s ease;
}

.event-detail-btn {
  font-size: 0.78rem;
  color: var(--c2-blue);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: gap 0.2s;
}

.event-detail-btn:hover {
  gap: 8px;
}

/* ─── SOLD OUT ──────────────────────────────── */
.event-card.sold-out {
  opacity: 0.65;
  pointer-events: auto;
}

.event-card.sold-out .event-card-body {
  position: relative;
}

.sold-out-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #D32F2F;
  color: white;
  font-family: 'Montserrat', Arial, sans-serif;
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(211,47,47,0.3);
  z-index: 2;
  transform: rotate(2deg);
}

.event-card.sold-out .event-card-stripe {
  background: #999 !important;
}

.event-card.sold-out .cap-fill {
  background: #D32F2F !important;
}

/* Sold out in modal */
.modal-sold-out-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #FDE8E8;
  border: 1.5px solid #F5C6C6;
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  margin-bottom: 20px;
}

.modal-sold-out-banner .sold-out-icon {
  font-size: 1.3rem;
}

.modal-sold-out-banner .sold-out-text {
  font-size: 0.88rem;
  font-weight: 600;
  color: #B71C1C;
}

/* ─── MODAL ─────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,15,30,0.5);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 30px;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: white;
  border-radius: 20px;
  max-width: 680px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 25px 80px rgba(0,0,0,0.2);
  animation: modalSlide 0.3s ease;
  position: relative;
}

@keyframes modalSlide {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-stripe {
  height: 6px;
  width: 100%;
  border-radius: 20px 20px 0 0;
}

.modal[data-type="Workshop"] .modal-stripe { background: var(--c2-blue); }
.modal[data-type="Demo"] .modal-stripe { background: var(--c2-green); }
.modal[data-type="Seminario"] .modal-stripe { background: var(--c2-purple); }
.modal[data-type="Visita Guidata"] .modal-stripe { background: var(--c2-accent); }

.modal-close {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.05);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--c2-text-mid);
  transition: background 0.2s;
  z-index: 2;
}

.modal-close:hover { background: rgba(0,0,0,0.1); }

.modal-content {
  padding: 36px 36px 28px;
}

          <option value="all">Tutte le aree</option>
        </select>
      </div>
    </div>

    <div class="room-filter-row" id="roomFilters">
      <span class="filter-label" style="margin-right:2px">Area:</span>
    </div>

    <div style="margin-bottom:24px">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Cerca per titolo, partner o parola chiave…">
      </div>
    </div>

    <div class="results-bar">
      <div class="results-count" id="resultsCount"></div>
      <div class="view-toggle" id="viewToggle">
        <button class="view-toggle-btn active" data-view="time">🕐 Per Orario</button>
        <button class="view-toggle-btn" data-view="room">📍 Per Aula</button>
      </div>
    </div>

    <div class="timeline" id="timeline"></div>
  </div>

  <!-- ═══ TAB: MAPPA ═══ -->
  <div class="tab-content" id="tab-mappa">
    <div class="map-intro">
      <h2 class="map-title">Mappa dello Stand K42</h2>
      <p class="map-subtitle">Tocca un'area per scoprirne i dettagli</p>
    </div>
    <div class="map-container" id="mapContainer">
      <img class="stand-map-img" src="mappa/stand.jpg" alt="Mappa Stand K42">
    </div>
  </div>

  <!-- Zone detail overlay (separate from event modal) -->
  <div class="zone-overlay" id="zoneOverlay">
    <div class="zone-modal" id="zoneModal">
      <button class="zone-close" id="zoneClose">✕</button>
      <div id="zoneContent"></div>
    </div>
  </div>

  <!-- ═══ TAB: MATERIALI ═══ -->
  <div class="tab-content" id="tab-materiali">
    <div class="mat-intro">
      <h2 class="mat-title">Materiali e Brochure</h2>
      <p class="mat-subtitle">Scarica cataloghi, brochure e schede tecniche delle nostre soluzioni</p>
    </div>
    <div class="mat-grid" id="matGrid"></div>
  </div>

  <!-- Brochure detail overlay -->
  <div class="brochure-overlay" id="brochureOverlay">
    <div class="brochure-modal" id="brochureModal">
      <button class="brochure-close" id="brochureClose">&times;</button>
      <div id="brochureContent"></div>
    </div>
  </div>

</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-stripe"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// EVENT DATA
// ════════════════════════════════════════════════
let EVENTS = [];

async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    EVENTS = await resp.json();
  } catch(err) {
    console.error('Errore caricamento data.json:', err);
  }
}

// ════════════════════════════════════════════════
// PARTNER LOGOS
// ════════════════════════════════════════════════
const PARTNER_LOGOS = {
  'Adobe': 'loghi/Adobe.png',
  'AID': 'loghi/AID.png',
  'Arduino': 'loghi/Arduino.png',
  'Bullismo No Grazie': 'loghi/Bullismo.png',
  'C2 Group': 'loghi/C2_Oriz.png',
  'Canva': 'loghi/Canva.png',
  'Chiara Celino': null,
  'CIOFS': 'loghi/CIOF.png',
  'Corriere della Sera': 'loghi/Corriere_della_Sera.png',
  'Delightex Edu': 'loghi/Delightex_Edu.png',
  'DSGA Online': 'loghi/DSGA_Online.png',
  'Genially': 'loghi/Genially.png',
  'Google for Education': 'loghi/Google.png',
  'LEGO® Education': 'loghi/Lego.png',
  'Okulus Scuola Sicura': null,
  'ThingLink': 'loghi/ThingLink.png',
  'TOG': null,
  'Verse': 'loghi/Verse.png',
  'Zebra Multimedia': 'loghi/Zebra.png',
  '-': null
};

function partnerLogoHTML(partner, size = 20) {
  const src = PARTNER_LOGOS[partner];
  if (!src) return `<span class="partner-name-text">${partner}</span>`;
  return `<img src="${src}" alt="${partner}" title="${partner}" style="height:${size}px;width:auto;object-fit:contain;vertical-align:middle;">`;
}

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const DATES = ['2026-03-11','2026-03-12','2026-03-13'];
const DATE_LABELS = {'2026-03-11':'Mercoledì 11 Marzo','2026-03-12':'Giovedì 12 Marzo','2026-03-13':'Venerdì 13 Marzo'};
const DATE_SHORT = {'2026-03-11':'11 Marzo','2026-03-12':'12 Marzo','2026-03-13':'13 Marzo'};
const DAY_NAMES = {'2026-03-11':'Giorno 1','2026-03-12':'Giorno 2','2026-03-13':'Giorno 3'};

let state = {
  activeDay: '2026-03-11',
  activeTypes: new Set(['Workshop','Demo','Seminario','Visita Guidata']),
  activeRoom: null, // null = all
  search: '',
  viewMode: 'time' // 'time' or 'room'
};

// ════════════════════════════════════════════════
// URL SYNC — deep-linkable filters
// ════════════════════════════════════════════════
const ALL_TYPES = ['Workshop','Demo','Seminario','Visita Guidata'];

function readURLToState() {
  const p = new URLSearchParams(window.location.search);

  if (p.has('day') && DATES.includes(p.get('day'))) {
    state.activeDay = p.get('day');
  }

  if (p.has('type')) {
    const types = p.get('type').split(',').filter(t => ALL_TYPES.includes(t));
    if (types.length > 0) state.activeTypes = new Set(types);
  }

  if (p.has('room')) {
    state.activeRoom = p.get('room');
  }

  if (p.has('q')) {
    state.search = p.get('q').toLowerCase().trim();
  }

  if (p.has('tab')) {
    state.urlTab = p.get('tab'); // applied after DOM ready
  }
}

function syncURLFromState() {
  const p = new URLSearchParams();

  // Tab
  const activeTab = document.querySelector('.tab.active');
  if (activeTab && activeTab.dataset.tab !== 'eventi') {
    p.set('tab', activeTab.dataset.tab);
  }

  // Day
  if (state.activeDay !== DATES[0]) {
    p.set('day', state.activeDay);
  }

  // Types (only if not all selected)
  if (state.activeTypes.size < ALL_TYPES.length) {
    p.set('type', [...state.activeTypes].join(','));
  }

  // Room
  if (state.activeRoom) {
    p.set('room', state.activeRoom);
  }

  // Search
  if (state.search) {
    p.set('q', state.search);
  }

  const qs = p.toString();
  const newURL = window.location.pathname + (qs ? '?' + qs : '');
  window.history.replaceState(null, '', newURL);
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
async function init() {
  await loadData();
  readURLToState();
  buildDaySelector();
  buildTypeFilters();
  buildRoomFilters();
  bindTabs();
  bindSearch();
  bindModal();
  bindViewToggle();
  bindMobileFilters();

  // Apply search from URL
  if (state.search) {
    document.getElementById('searchInput').value = state.search;
  }

  // Sync mobile dropdowns from URL state
  if (state.activeRoom) {
    document.getElementById('mobileRoomFilter').value = state.activeRoom;
  }
  if (state.activeTypes.size === 1) {
    document.getElementById('mobileTypeFilter').value = [...state.activeTypes][0];
  } else if (state.activeTypes.size < ALL_TYPES.length) {
    document.getElementById('mobileTypeFilter').value = 'all';
  }

  // Apply tab from URL
  if (state.urlTab) {
    const tabBtn = document.querySelector(`.tab[data-tab="${state.urlTab}"]`);
    if (tabBtn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tabBtn.classList.add('active');
      document.getElementById('tab-' + state.urlTab).classList.add('active');
    }
  }

  render();
  loadZones();
  loadMaterials();

  // Auto-refresh dati ogni 60 secondi (per aggiornamento iscritti)
  setInterval(async () => {
    await loadData();
    render();
  }, 60000);
}

// ── Tabs ────────────────────────────────────
function bindTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      syncURLFromState();
    });
  });
}

// ── Day selector ────────────────────────────
function buildDaySelector() {
  const el = document.getElementById('daySelector');
  el.innerHTML = DATES.map(d => {
    const count = EVENTS.filter(e => e.date === d).length;
    return `<button class="day-btn ${d === state.activeDay ? 'active' : ''}" data-date="${d}">
      <div class="day-label">${DAY_NAMES[d]}</div>
      <div class="day-date">${DATE_SHORT[d]}</div>
      <div class="day-count">${count} eventi</div>
    </button>`;
  }).join('');

  el.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeDay = btn.dataset.date;
      el.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.dataset.date === state.activeDay));
      render();
    });
  });
}

// ── Type filters ────────────────────────────
function buildTypeFilters() {
  const types = ['Workshop','Demo','Seminario','Visita Guidata'];
  const el = document.getElementById('typeFilters');
  el.innerHTML = types.map(t => {
    const count = EVENTS.filter(e => e.type === t && e.date === state.activeDay).length;
    const isActive = state.activeTypes.has(t);
    return `<button class="type-pill ${isActive ? 'active' : ''}" data-type="${t}">
      <span class="type-dot"></span> ${t} <span class="pill-count">${count}</span>
    </button>`;
  }).join('');

  el.querySelectorAll('.type-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const type = pill.dataset.type;
      if (state.activeTypes.has(type)) {
        if (state.activeTypes.size > 1) state.activeTypes.delete(type);
      } else {
        state.activeTypes.add(type);
      }
      pill.classList.toggle('active', state.activeTypes.has(type));
      render();
    });
  });
}

function updateTypeCounts() {
  document.querySelectorAll('.type-pill').forEach(pill => {
    const t = pill.dataset.type;
    const count = EVENTS.filter(e => e.type === t && e.date === state.activeDay).length;
    pill.querySelector('.pill-count').textContent = count;
  });
}

// ── Room filters ────────────────────────────
function buildRoomFilters() {
  const rooms = [...new Set(EVENTS.map(e => e.room))].sort();
  const el = document.getElementById('roomFilters');
  el.innerHTML = '<span class="filter-label" style="margin-right:2px">Area:</span>' +
    `<button class="room-pill ${!state.activeRoom ? 'active' : ''}" data-room="all">Tutte</button>` +
    rooms.map(r => `<button class="room-pill ${state.activeRoom === r ? 'active' : ''}" data-room="${r}">${r}</button>`).join('');

  el.querySelectorAll('.room-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      state.activeRoom = pill.dataset.room === 'all' ? null : pill.dataset.room;
      el.querySelectorAll('.room-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      // Sync mobile dropdown
      document.getElementById('mobileRoomFilter').value = pill.dataset.room;
      render();
    });
  });

  // Populate mobile room dropdown
  const mobileRoom = document.getElementById('mobileRoomFilter');
  mobileRoom.innerHTML = '<option value="all">Tutte le aree</option>' +
    rooms.map(r => `<option value="${r}">${r}</option>`).join('');
}

function bindMobileFilters() {
  const allTypes = ['Workshop','Demo','Seminario','Visita Guidata'];

  // Mobile type filter
  const mobileType = document.getElementById('mobileTypeFilter');
  mobileType.addEventListener('change', () => {
    if (mobileType.value === 'all') {
      state.activeTypes = new Set(allTypes);
    } else {
      state.activeTypes = new Set([mobileType.value]);
    }
    // Sync desktop pills
    document.querySelectorAll('.type-pill').forEach(pill => {
      pill.classList.toggle('active', state.activeTypes.has(pill.dataset.type));
    });
    render();
  });

  // Mobile room filter
  const mobileRoom = document.getElementById('mobileRoomFilter');
  mobileRoom.addEventListener('change', () => {
    state.activeRoom = mobileRoom.value === 'all' ? null : mobileRoom.value;
    // Sync desktop pills
    document.querySelectorAll('.room-pill').forEach(p => {
      p.classList.toggle('active', (state.activeRoom === null && p.dataset.room === 'all') || p.dataset.room === state.activeRoom);
    });
    render();
  });
}

// ── Search ──────────────────────────────────
function bindSearch() {
  const input = document.getElementById('searchInput');
  let debounce;
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      state.search = input.value.toLowerCase().trim();
      render();
    }, 200);
  });
}

// ── View Toggle ─────────────────────────────
function bindViewToggle() {
  const toggle = document.getElementById('viewToggle');
  toggle.querySelectorAll('.view-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.viewMode = btn.dataset.view;
      toggle.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === state.viewMode));
      render();
    });
  });
}

function updateViewToggleVisibility() {
  const toggle = document.getElementById('viewToggle');
  // Hide the toggle when a specific room is filtered (room view makes no sense with 1 room)
  if (state.activeRoom) {
    toggle.style.opacity = '0.35';
    toggle.style.pointerEvents = 'none';
    // Force time view when single room selected
    state.viewMode = 'time';
    toggle.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'time'));
  } else {
    toggle.style.opacity = '1';
    toggle.style.pointerEvents = 'auto';
  }
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function render() {
  updateTypeCounts();
  updateViewToggleVisibility();

  let filtered = EVENTS.filter(e => {
    if (e.date !== state.activeDay) return false;
    if (!state.activeTypes.has(e.type)) return false;
    if (state.activeRoom && e.room !== state.activeRoom) return false;
    if (state.search) {
      const haystack = (e.title + ' ' + e.partner + ' ' + e.abstract + ' ' + e.code + ' ' + e.room).toLowerCase();
      if (!haystack.includes(state.search)) return false;
    }
    return true;
  });

  // Sort by time
  filtered.sort((a, b) => a.time.localeCompare(b.time));

  const timeline = document.getElementById('timeline');
  const resultsCount = document.getElementById('resultsCount');

  resultsCount.innerHTML = `<strong>${filtered.length}</strong> eventi ${DATE_LABELS[state.activeDay]}`;

  if (filtered.length === 0) {
    timeline.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <p>Nessun evento trovato con i filtri selezionati</p>
    </div>`;
    syncURLFromState();
    return;
  }

  if (state.viewMode === 'room' && !state.activeRoom) {
    renderByRoom(filtered, timeline);
  } else {
    renderByTime(filtered, timeline);
  }

  // Bind card clicks
  timeline.querySelectorAll('.event-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.code));
  });

  syncURLFromState();
}

const ROOM_ICONS = {
  'C2 Agorà': '🎤',
  'C2 Google Area powered by Acer': '💻',
  'C2 Robotica': '🤖',
  'C2 STEAM': '🧱',
  'C2 Software Area': '🖥️',
  'E16 Cavedio - Pad.Spadolini Inferiore': '🏛️',
  "Kairos - L'aula delle Connessioni": '✨'
};

function renderByTime(filtered, container) {
  const groups = {};
  filtered.forEach(e => {
    if (!groups[e.time]) groups[e.time] = [];
    groups[e.time].push(e);
  });

  container.innerHTML = Object.entries(groups).map(([time, events]) => `
    <div class="time-group">
      <div class="time-label">
        <span class="clock-icon">🕐</span>
        <span>${time}</span>
      </div>
      <div class="events-row">
        ${events.map(e => renderCard(e)).join('')}
      </div>
    </div>
  `).join('');
}

function renderByRoom(filtered, container) {
  // Group by room, maintaining order
  const roomOrder = [
    'C2 Agorà',
    'C2 Google Area powered by Acer',
    'C2 STEAM',
    'C2 Robotica',
    'C2 Software Area',
    'E16 Cavedio - Pad.Spadolini Inferiore',
    "Kairos - L'aula delle Connessioni"
  ];

  const groups = {};
  filtered.forEach(e => {
    if (!groups[e.room]) groups[e.room] = [];
    groups[e.room].push(e);
  });

  // Sort rooms by predefined order
  const sortedRooms = Object.keys(groups).sort((a, b) => {
    const ia = roomOrder.indexOf(a);
    const ib = roomOrder.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  container.innerHTML = sortedRooms.map(room => {
    const events = groups[room];
    const icon = ROOM_ICONS[room] || '📍';
    return `
      <div class="room-group">
        <div class="room-group-header">
          <div class="room-group-icon">${icon}</div>
          <div class="room-group-name">${room}</div>
          <div class="room-group-count">${events.length} eventi</div>
        </div>
        <div class="events-row">
          ${events.map(e => renderCard(e, true)).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderCard(e, showTime = false) {
  const pct = e.capacity > 0 ? Math.round((e.enrolled / e.capacity) * 100) : 0;
  const isSoldOut = e.capacity > 0 && e.enrolled >= e.capacity;
  const soldOutClass = isSoldOut ? ' sold-out' : '';
  const soldOutBadge = isSoldOut ? '<div class="sold-out-badge">Sold Out</div>' : '';
  return `<div class="event-card${soldOutClass}" data-type="${e.type}" data-code="${e.code}">
    <div class="event-card-stripe"></div>
    <div class="event-card-body">
      ${soldOutBadge}
      <div class="event-card-meta">
        <span class="event-type-badge">${e.type}</span>
        ${showTime ? `<span class="event-type-badge" style="background:rgba(0,0,0,0.06);color:var(--c2-text);">🕐 ${e.time}</span>` : ''}
        <span class="event-partner">${partnerLogoHTML(e.partner, 44)}</span>
      </div>
      <div class="event-card-title">${e.title}</div>
      <div class="event-card-room">📍 ${e.room}</div>
    </div>
    <div class="event-card-footer">
      <div class="event-capacity">
        <span>${e.enrolled}/${e.capacity} posti</span>
        <div class="cap-bar"><div class="cap-fill" style="width:${Math.min(pct,100)}%"></div></div>
      </div>
      <button class="event-detail-btn">Dettagli →</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════
function bindModal() {
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
  document.getElementById('modalClose').addEventListener('click', closeModal);
}

function openModal(code) {
  const e = EVENTS.find(ev => ev.code === code);
  if (!e) return;

  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  modal.setAttribute('data-type', e.type);

  const dateLabel = DATE_LABELS[e.date] || e.date;
  const isSoldOut = e.capacity > 0 && e.enrolled >= e.capacity;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-meta">
      <span class="modal-type-badge">${e.type}</span>
      <span class="modal-code">${e.code}</span>
    </div>
    <h2 class="modal-title">${e.title}</h2>
    ${isSoldOut ? `<div class="modal-sold-out-banner">
      <span class="sold-out-icon">🚫</span>
      <span class="sold-out-text">Evento al completo — Sold Out</span>
    </div>` : ''}
    <div class="modal-info-grid">
      <div class="modal-info-item">
        <div class="info-label">📅 Data e Ora</div>
        <div class="info-value">${dateLabel}<br>${e.time}</div>
      </div>
      <div class="modal-info-item">
        <div class="info-label">📍 Luogo</div>
        <div class="info-value">${e.room}</div>
      </div>
      <div class="modal-info-item">
        <div class="info-label">🤝 Partner</div>
        <div class="info-value" style="display:flex;align-items:center;gap:8px;">${partnerLogoHTML(e.partner, 44)}</div>
      </div>
      <div class="modal-info-item">
        <div class="info-label">👥 Capienza</div>
        <div class="info-value">${e.enrolled} / ${e.capacity} iscritti</div>
      </div>
    </div>
    ${e.abstract ? `<div class="modal-abstract-label">Descrizione</div><p class="modal-abstract">${e.abstract}</p>` : ''}
    <div class="modal-actions">
      <button class="btn-primary cta-dettagli-evento" data-event-code="${e.code}">
        ✉️ Ricevi dettagli via email
      </button>
    </div>
  `;

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Push SiteData to dataLayer NOW (when modal opens)
  // so GTM has time to process before user clicks CTA
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    'event': 'cta_dettagli_evento',
    'eventCode': e.code,
    'eventTitle': e.title,
    'eventType': e.type,
    'eventPartner': e.partner,
    'eventDate': e.date,
    'eventTime': e.time,
    'eventRoom': e.room,
    'eventAbstract': e.abstract,
    'eventLink': e.link,
    'eventCapacity': e.capacity,
    'eventEnrolled': e.enrolled
  });

  // CTA click: Sleeknote catches it via class 'cta-dettagli-evento'
  // SiteData is already set by GTM at this point
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ════════════════════════════════════════════════
// STAND MAP — ZONES
// ════════════════════════════════════════════════
let ZONES = [];

async function loadZones() {
  try {
    const resp = await fetch('zones.json?t=' + Date.now());
    ZONES = await resp.json();
    renderMapPins();
    bindZoneModal();
  } catch(err) {
    console.error('Errore caricamento zones.json:', err);
  }
}

function renderMapPins() {
  const container = document.getElementById('mapContainer');
  if (!container) return;

  // Remove existing pins
  container.querySelectorAll('.map-pin').forEach(p => p.remove());

  ZONES.forEach((zone, i) => {
    const pin = document.createElement('button');
    pin.className = 'map-pin';
    pin.dataset.zone = zone.id;
    pin.style.left = zone.pinX + '%';
    pin.style.top = zone.pinY + '%';
    pin.style.setProperty('--pin-delay', (i * 0.15) + 's');
    pin.innerHTML = `
      <div class="pin-marker">
        <span class="pin-marker-icon">${zone.emoji}</span>
      </div>
      <span class="pin-label">${zone.name}</span>
    `;
    container.appendChild(pin);
  });
}

function openZone(zoneId) {
  const zone = ZONES.find(z => z.id === zoneId);
  if (!zone) return;

  const overlay = document.getElementById('zoneOverlay');
  const content = document.getElementById('zoneContent');

  // Hero image
  let heroHTML = '';
  if (zone.image) {
    heroHTML = `<img class="zone-hero" src="${zone.image}" alt="${zone.name}">`;
  } else {
    heroHTML = `<div class="zone-hero-placeholder">${zone.emoji}</div>`;
  }

  // Brands
  let brandsHTML = '';
  if (zone.brands && zone.brands.length > 0) {
    brandsHTML = `
      <div class="zone-section-title">Brand che troverai</div>
      <div class="zone-brands">
        ${zone.brands.map(b => {
          const logo = PARTNER_LOGOS[b];
          if (logo) return `<img class="zone-brand-item" src="${logo}" alt="${b}" title="${b}">`;
          return `<span class="zone-brand-text">${b}</span>`;
        }).join('')}
      </div>`;
  }

  // People
  let peopleHTML = '';
  if (zone.people && zone.people.length > 0) {
    peopleHTML = `
      <div class="zone-section-title">Chi troverai</div>
      <div class="zone-people">
        ${zone.people.map(p => {
          const initials = p.name.split(' ').map(w => w[0]).join('').slice(0, 2);
          return `<div class="zone-person">
            <div class="zone-person-avatar">${initials}</div>
            <div class="zone-person-info">
              <span class="zone-person-name">${p.name}</span>
              <span class="zone-person-role">${p.role}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }

  // Link
  let linkHTML = '';
  if (zone.link) {
    linkHTML = `<a class="zone-link" href="${zone.link}" target="_blank">📅 Prenota il tuo posto →</a>`;
  }

  content.innerHTML = `
    ${heroHTML}
    <div class="zone-body">
      <div class="zone-name">
        <span class="zone-name-emoji">${zone.emoji}</span>
        ${zone.name}
      </div>
      <div class="zone-desc">${zone.description}</div>
      ${linkHTML}
      ${brandsHTML}
      ${peopleHTML}
    </div>
  `;

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeZone() {
  document.getElementById('zoneOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function bindZoneModal() {
  // Pin clicks
  document.getElementById('mapContainer').addEventListener('click', (e) => {
    const pin = e.target.closest('.map-pin');
    if (pin) openZone(pin.dataset.zone);
  });

  // Close zone modal
  document.getElementById('zoneClose').addEventListener('click', closeZone);
  document.getElementById('zoneOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('zoneOverlay')) closeZone();
  });
}

// ── Start ───────────────────────────────────
// ════════════════════════════════════════════════
// MATERIALS / BROCHURE
// ════════════════════════════════════════════════
let MATERIALS = [];

async function loadMaterials() {
  try {
    const resp = await fetch('materiali.json?t=' + Date.now());
    MATERIALS = await resp.json();
    renderMaterials();
    bindBrochureModal();
  } catch(err) {
    console.error('Errore caricamento materiali.json:', err);
  }
}

function renderMaterials() {
  const grid = document.getElementById('matGrid');
  if (!grid) return;
  grid.innerHTML = MATERIALS.map(m => `
    <div class="mat-card" data-brochure="${m.id}">
      <img class="mat-card-img" src="${m.image}" alt="${m.title}" loading="lazy">
      <div class="mat-card-body">
        <div class="mat-card-category">${m.category}</div>
        <div class="mat-card-title">${m.title}</div>
        <div class="mat-card-abstract">${m.abstract}</div>
      </div>
    </div>
  `).join('');
}

function openBrochure(brochureId) {
  const m = MATERIALS.find(b => b.id === brochureId);
  if (!m) return;

  const overlay = document.getElementById('brochureOverlay');
  const content = document.getElementById('brochureContent');

  content.innerHTML = `
    <img class="brochure-hero" src="${m.image}" alt="${m.title}">
    <div class="brochure-body">
      <div class="brochure-category">${m.category}</div>
      <div class="brochure-name">${m.title}</div>
      <div class="brochure-desc">${m.abstract}</div>
      <div class="brochure-actions">
        <button class="brochure-cta cta-richiedi-brochure" data-brochure-id="${m.id}" data-brochure-title="${m.title}">
          ✉️ Ricevi brochure via email
        </button>
        <a class="brochure-link" href="${m.link}" target="_blank">📖 Sfoglia online</a>
      </div>
    </div>
  `;

  // DataLayer push
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    'event': 'brochure_aperta',
    'brochure_id': m.id,
    'brochure_title': m.title,
    'brochure_category': m.category,
    'brochure_link': m.link
  });

  // Sleeknote SiteData for brochure
  window.sleeknoteSiteData = window.sleeknoteSiteData || [];
  window.sleeknoteSiteData.push({'brochure_id': m.id});
  window.sleeknoteSiteData.push({'brochure_title': m.title});
  window.sleeknoteSiteData.push({'brochure_category': m.category});
  window.sleeknoteSiteData.push({'brochure_link': m.link});

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeBrochure() {
  document.getElementById('brochureOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function bindBrochureModal() {
  // Card clicks
  document.getElementById('matGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.mat-card');
    if (card) openBrochure(card.dataset.brochure);
  });

  // CTA click: dataLayer push + trigger Sleeknote via hidden button
  document.addEventListener('click', (e) => {
    const cta = e.target.closest('.cta-richiedi-brochure');
    if (!cta) return;

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      'event': 'cta_richiedi_brochure',
      'brochure_id': cta.dataset.brochureId,
      'brochure_title': cta.dataset.brochureTitle
    });

    // Trigger Sleeknote popup via hidden click element
    const trigger = document.getElementById('sleeknoteClickTrigger');
    if (trigger) trigger.click();
  });

  // Close
  document.getElementById('brochureClose').addEventListener('click', closeBrochure);
  document.getElementById('brochureOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('brochureOverlay')) closeBrochure();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
